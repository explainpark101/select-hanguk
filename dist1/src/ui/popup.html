<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Select Hanguk</title>
  <style>
    body {
      width: 280px;
      padding: 12px 16px;
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
    }
    h2 {
      margin: 0 0 12px 0;
      font-size: 14px;
      font-weight: 600;
    }
    label {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      cursor: pointer;
    }
    input[type="checkbox"] {
      width: 16px;
      height: 16px;
    }
    .row {
      margin-bottom: 4px;
    }
    select {
      width: 100%;
      padding: 4px 8px;
      margin-top: 4px;
    }
    a {
      color: #1a73e8;
      text-decoration: none;
      font-size: 12px;
    }
    a:hover { text-decoration: underline; }
    #status {
      margin-top: 8px;
      font-size: 12px;
      color: #5f6368;
    }
  </style>
</head>
<body>
  <h2>Select Hanguk</h2>
  <div class="row">
    <label>
      <input type="checkbox" id="enabled" checked>
      확장 프로그램 사용 (Enabled)
    </label>
  </div>
  <div class="row">
    <label>
      <input type="checkbox" id="autoSelect">
      자동 선택 (Auto Select)
    </label>
  </div>
  <div class="row">
    <label for="mode">모드</label>
    <select id="mode">
      <option value="safe">Safe (상단 이동 위주)</option>
      <option value="aggressive">Aggressive (자동 클릭 포함)</option>
    </select>
  </div>
  <p>
    <a href="#" id="openOptions">설정(도메인/키워드) 열기</a>
  </p>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
