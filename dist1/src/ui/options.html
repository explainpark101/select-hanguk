<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Select Hanguk - 설정</title>
  <style>
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      max-width: 560px;
      padding: 20px;
      font-size: 14px;
    }
    h1 { font-size: 18px; margin-bottom: 16px; }
    section { margin-bottom: 20px; }
    section h2 { font-size: 14px; margin-bottom: 8px; }
    label { display: block; margin-bottom: 4px; }
    input[type="text"], textarea {
      width: 100%;
      padding: 6px 8px;
      box-sizing: border-box;
    }
    textarea { min-height: 80px; resize: vertical; }
    .hint { font-size: 12px; color: #5f6368; margin-top: 4px; }
    button {
      padding: 6px 12px;
      margin-right: 8px;
      margin-top: 4px;
    }
    #blocklistDomains, #allowlistDomains {
      font-family: monospace;
      font-size: 12px;
    }
    #status { margin-top: 12px; color: #1e8e3e; font-size: 13px; }
  </style>
</head>
<body>
  <h1>Select Hanguk 설정</h1>

  <section>
    <h2>차단 도메인 (Blocklist)</h2>
    <p class="hint">이 확장 프로그램을 사용하지 않을 사이트의 도메인을 한 줄에 하나씩 입력하세요. 예: example.com, pay.example.com</p>
    <textarea id="blocklistDomains" placeholder="example.com"></textarea>
  </section>

  <section>
    <h2>허용 도메인 (Allowlist, 선택)</h2>
    <p class="hint">비어 있으면 모든 사이트에 적용. 입력하면 여기 있는 도메인에서만 동작합니다.</p>
    <textarea id="allowlistDomains" placeholder="shop.example.com"></textarea>
  </section>

  <section>
    <h2>한국 매칭 키워드 (선택)</h2>
    <p class="hint">비어 두면 기본 키워드(한국, 대한민국, korea, south korea, kr, kor 등)를 사용합니다. 한 줄에 하나씩 추가할 수 있습니다.</p>
    <textarea id="keywords" placeholder="한국\nkorea\nkr"></textarea>
  </section>

  <section>
    <h2>기타</h2>
    <label>
      <input type="checkbox" id="debugLog">
      디버그 로그 (콘솔에 출력)
    </label>
  </section>

  <div>
    <button id="save">저장</button>
    <button id="allowThisSite">이 사이트에서만 허용</button>
  </div>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
